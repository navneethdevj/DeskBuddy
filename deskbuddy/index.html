<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeskBuddy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="world"></div>
  <div id="status-bar"></div>

  <!-- Hidden camera — face detection only, never shown to user.
       Use visibility:hidden (not display:none) so Chromium still decodes frames. -->
  <video id="camera-feed" autoplay playsinline muted
    style="visibility:hidden;position:absolute;width:1px;height:1px;pointer-events:none;">
  </video>

  <!-- CJS shim — vision_bundle.cjs needs module/exports globals that
       Electron renderer (nodeIntegration:false) does not provide -->
  <script>var exports = {}; var module = { exports: exports };</script>
  <script src="../node_modules/@mediapipe/tasks-vision/vision_bundle.cjs"></script>
  <script>
    // Copy MediaPipe classes from CJS exports to window for camera.js
    window.FaceLandmarker  = exports.FaceLandmarker;
    window.FilesetResolver = exports.FilesetResolver;
  </script>

  <script src="components/emotion.js"></script>
  <script src="components/companion.js"></script>
  <script src="components/spriteAnimator.js"></script>
  <script src="components/movement.js"></script>
  <script src="components/particles.js"></script>
  <script src="ui/status.js"></script>
  <script src="components/brain.js"></script>
  <script src="components/camera.js"></script>
  <script src="components/perception.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
