<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeskBuddy</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="world"></div>
  <div id="status-bar"></div>

  <!-- Phase 1: Hidden camera — used for face detection only, never displayed -->
  <video id="camera-feed" autoplay playsinline muted
    style="display:none; position:absolute; pointer-events:none; width:1px; height:1px;">
  </video>

  <!-- Phase 1: MediaPipe Face Landmarker -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.js"
    crossorigin="anonymous"></script>
  <script src="components/emotion.js"></script>
  <script src="components/companion.js"></script>
  <script src="components/spriteAnimator.js"></script>
  <script src="components/movement.js"></script>
  <script src="components/particles.js"></script>
  <script src="ui/status.js"></script>
  <script src="components/brain.js"></script>
  <script src="components/camera.js"></script>
  <script src="components/perception.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
