<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeskBuddy</title>
<style>
/* ===== Reset ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }

/* ===== DeskBuddy Container ===== */
#deskbuddy {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 9999;
  pointer-events: none;
}

/* ===== Body ===== */
#buddy-body {
  position: relative;
  width: 130px;
  height: 105px;
  border-radius: 50% 50% 48% 48% / 45% 45% 55% 55%;
  background: radial-gradient(ellipse at 50% 45%, #fffcf8 0%, #FFF8F2 40%, #f5ede4 100%);
  box-shadow: 0 10px 30px rgba(0,0,0,0.09), 0 4px 12px rgba(0,0,0,0.06);
}

/* ===== Ear Nubs ===== */
.ear {
  position: absolute;
  width: 18px;
  height: 14px;
  border-radius: 50% 50% 40% 40%;
  background: radial-gradient(ellipse at 50% 60%, #fffcf8 0%, #FFF8F2 50%, #f5ede4 100%);
  top: -6px;
}
.ear-left  { left: 22px;  transform: rotate(-12deg); }
.ear-right { right: 22px; transform: rotate(12deg); }

/* ===== Cheek Blushes ===== */
.cheek {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,130,130,0.13) 0%, rgba(255,130,130,0) 70%);
  bottom: 18px;
  pointer-events: none;
}
.cheek-left  { left: 12px; }
.cheek-right { right: 12px; }

/* ===== Eyes Container ===== */
#eyes-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  gap: 8px;
}

/* ===== Eye ===== */
.eye {
  position: relative;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: #FAFAF8;
  box-shadow: inset 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* ===== Iris ===== */
.iris {
  position: absolute;
  width: 27px;
  height: 27px;
  border-radius: 50%;
  background: radial-gradient(circle at 45% 40%, #7dd9ff 0%, #5BC8F5 50%, #49aee0 100%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ===== Pupil ===== */
.pupil {
  position: absolute;
  width: 12px;
  height: 14px;
  border-radius: 50%;
  background: #181828;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: none;
}

/* ===== Shine Highlights (fixed, DO NOT move with pupil) ===== */
.shine-large {
  position: absolute;
  width: 7px;
  height: 6px;
  border-radius: 50%;
  background: #FFFFFF;
  opacity: 0.92;
  top: 8px;
  left: 8px;
  transform: rotate(-15deg);
  z-index: 10;
  pointer-events: none;
}
.shine-small {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: #FFFFFF;
  opacity: 0.60;
  bottom: 10px;
  right: 9px;
  z-index: 10;
  pointer-events: none;
}

/* ===== Eyelid ===== */
.eyelid {
  position: absolute;
  top: 0;
  left: -1px;
  right: -1px;
  height: 8%;
  background: #FFF8F2;
  border-radius: 0 0 50% 50% / 0 0 100% 100%;
  z-index: 20;
  pointer-events: none;
  transition: none;
}

/* ===== Eyelashes ===== */
.eyelashes {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 10px;
  z-index: 21;
  pointer-events: none;
}
.lash {
  position: absolute;
  width: 2px;
  height: 4px;
  background: #EEE0D5;
  border-radius: 1px;
  top: 0;
}
/* Left eye lashes */
.eye:first-child .lash:nth-child(1) { left: 8px;  transform: rotate(-20deg); height: 5px; }
.eye:first-child .lash:nth-child(2) { left: 14px; transform: rotate(-8deg);  height: 4px; }
.eye:first-child .lash:nth-child(3) { left: 20px; transform: rotate(5deg);   height: 5px; }
.eye:first-child .lash:nth-child(4) { left: 26px; transform: rotate(15deg);  height: 4px; }
/* Right eye lashes */
.eye:last-child .lash:nth-child(1) { left: 14px; transform: rotate(-15deg); height: 4px; }
.eye:last-child .lash:nth-child(2) { left: 20px; transform: rotate(-5deg);  height: 5px; }
.eye:last-child .lash:nth-child(3) { left: 26px; transform: rotate(8deg);   height: 4px; }
.eye:last-child .lash:nth-child(4) { left: 32px; transform: rotate(20deg);  height: 5px; }

/* ===== UI Text Elements ===== */
#emotion-display {
  position: fixed;
  top: 14px;
  right: 16px;
  font-family: monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  opacity: 0.45;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  transition: opacity 0.4s ease;
  z-index: 10000;
}
#user-state-display {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.80);
  opacity: 0.35;
  pointer-events: none;
  text-align: center;
  z-index: 10000;
}
#focus-timer {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.70);
  opacity: 0.20;
  pointer-events: none;
  text-align: center;
  letter-spacing: 0.5px;
  z-index: 10000;
}
</style>
</head>
<body>

<!-- Hidden video element for webcam (never visible) -->
<video id="cameraVideo" autoplay playsinline muted style="display:none"></video>

<!-- DeskBuddy -->
<div id="deskbuddy">
  <div id="buddy-body">
    <!-- Ears -->
    <div class="ear ear-left"></div>
    <div class="ear ear-right"></div>
    <!-- Cheeks -->
    <div class="cheek cheek-left"></div>
    <div class="cheek cheek-right"></div>
    <!-- Eyes -->
    <div id="eyes-container">
      <div class="eye" id="eye-left">
        <div class="iris" id="iris-left">
          <div class="pupil" id="pupil-left"></div>
        </div>
        <div class="shine-large"></div>
        <div class="shine-small"></div>
        <div class="eyelid" id="lid-left"></div>
        <div class="eyelashes"><div class="lash"></div><div class="lash"></div><div class="lash"></div><div class="lash"></div></div>
      </div>
      <div class="eye" id="eye-right">
        <div class="iris" id="iris-right">
          <div class="pupil" id="pupil-right"></div>
        </div>
        <div class="shine-large"></div>
        <div class="shine-small"></div>
        <div class="eyelid" id="lid-right"></div>
        <div class="eyelashes"><div class="lash"></div><div class="lash"></div><div class="lash"></div><div class="lash"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- UI Text Elements -->
<div id="emotion-display">DeskBuddy: happy ˘ω˘</div>
<div id="user-state-display">you: focused</div>
<div id="focus-timer">focus 00:00</div>

<!-- MediaPipe Vision (Face Landmarker) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js" crossorigin="anonymous"></script>

<script>
(function () {
  'use strict';

  // ===== Utility Functions =====
  function lerp(a, b, t) { return a + (b - a) * t; }
  function euclidean(p1, p2) {
    return Math.sqrt((p1.x - p2.x) ** 2 + (p1.y - p2.y) ** 2);
  }
  function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

  // ===== DOM References =====
  var buddyBody     = document.getElementById('buddy-body');
  var deskbuddy     = document.getElementById('deskbuddy');
  var pupilLeft     = document.getElementById('pupil-left');
  var pupilRight    = document.getElementById('pupil-right');
  var irisLeft      = document.getElementById('iris-left');
  var irisRight     = document.getElementById('iris-right');
  var lidLeft       = document.getElementById('lid-left');
  var lidRight      = document.getElementById('lid-right');
  var emotionEl     = document.getElementById('emotion-display');
  var userStateEl   = document.getElementById('user-state-display');
  var focusTimerEl  = document.getElementById('focus-timer');
  var videoElement  = document.getElementById('cameraVideo');

  // ===== Constants =====
  var IRIS_RADIUS        = 13.5;  // half of 27px iris
  var PUPIL_MAX_TRAVEL   = IRIS_RADIUS * 0.30;  // 30% of iris radius
  var DETECTION_INTERVAL = 80;    // ~12 FPS for face detection

  // Stage 4 — Motion constants
  var STILL_THRESHOLD_PX = 4;
  var STILL_DURATION_MS  = 5000;

  // ===== State =====
  var cameraAvailable    = false;
  var faceLandmarker     = null;

  // Blink state
  var lidTargetL  = 0.08;
  var lidTargetR  = 0.08;
  var lidCurrentL = 0.08;
  var lidCurrentR = 0.08;
  var blinkPhase  = 'idle';
  var nextBlinkTime = 0;

  // Focus timer
  var focusTimerSeconds = 0;
  var focusTimerRunning = false;
  var lastFocusTickTime = 0;

  // ===== STAGE 3 — Perception Layer State =====
  var facePresent    = false;
  var headYaw        = 0;    // degrees, from transformation matrix
  var headPitch      = 0;    // degrees, from transformation matrix
  var eyeOpenness    = 1;    // 0=closed, 1=open
  var headMovement   = 0;    // euclidean px between frames
  var faceX          = 0.5;  // normalized face center (0-1)
  var faceY          = 0.5;
  var faceNormX      = 0;    // (faceX - 0.5) * 2 → range -1 to +1
  var faceNormY      = 0;

  var prevNoseTip    = null; // { x, y } from previous frame

  // State classification
  var currentUserState   = 'NoFace';
  var previousUserState  = 'NoFace';
  var stateEntryTime     = performance.now();
  var candidateState     = 'NoFace';
  var candidateStateTime = performance.now();
  var STATE_DEBOUNCE_MS  = 1000;

  // Sleepy & NoFace timers (continuous hold)
  var sleepyTimer    = 0;
  var noFaceTimer    = 0;
  var SLEEPY_HOLD_MS = 3000;
  var NOFACE_HOLD_MS = 3000;

  // Distracted detection: track yaw direction changes >20° in 10s window
  var yawHistory = [];  // { time, yaw }

  // ===== STAGE 4 — Motion Detection State =====
  var stillTimer   = 0;
  var userIsStill  = false;
  var timeStillMs  = 0;
  var wasStill     = false;  // previous frame's userIsStill, for P2 transition detect

  // ===== STAGE 5 — Attention Brain State =====
  var gazeTarget = { x: 0, y: 0 };

  // Current emotion (set by emotion logic)
  var currentEmotion       = 'happy';
  var triggerEmbarrassed   = false;
  var lastAttentionEvalTime = 0;
  var ATTENTION_EVAL_MS     = 500;

  // Curiosity scan
  var curiosityScanActive  = false;
  var curiosityScanStep    = 0;
  var curiosityScanHoldEnd = 0;

  // Search scan
  var searchScanActive     = false;
  var searchScanStep       = 0;
  var searchScanHoldEnd    = 0;
  var searchScanLerp       = 0.12;

  // ===== STAGE 6 — Eye Motion System State =====
  var pupilX       = 0;
  var pupilY       = 0;
  var pupilLerpSpeed = 0.070;

  // Body lean (gaze drift)
  var leanX       = 0;
  var leanY       = 0;
  var leanTargetX = 0;
  var leanTargetY = 0;

  // ===== Helper: show emotion text =====
  function showEmotionText(text) {
    emotionEl.textContent = text;
  }

  // ===== Helper: update user state text =====
  function showUserState(text) {
    userStateEl.textContent = text;
  }

  // ===== Helper: update focus timer text =====
  function updateFocusTimerDisplay() {
    var mins = Math.floor(focusTimerSeconds / 60);
    var secs = Math.floor(focusTimerSeconds % 60);
    focusTimerEl.textContent = 'focus ' +
      String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
  }

  // ===== Floating Motion (Phase 1 Layer 1 — preserved) =====
  var lastFloatX = 0;
  var lastFloatY = 0;
  function computeFloat(t) {
    lastFloatY = Math.sin(t * 0.0008) * 4.5 + Math.sin(t * 0.00131) * 2.0 + Math.sin(t * 0.00197) * 1.0;
    lastFloatX = Math.sin(t * 0.00061) * 2.5 + Math.sin(t * 0.00109) * 1.5 + Math.sin(t * 0.00173) * 0.8;
  }

  // ===== Blinking (Phase 1 — preserved) =====
  function scheduleNextBlink() {
    nextBlinkTime = performance.now() + 3000 + Math.random() * 2000;
  }

  function startBlink() {
    blinkPhase = 'closing';
    lidTargetL = 1.0;
    lidTargetR = 1.0;
  }

  function updateBlink(t) {
    if (blinkPhase === 'idle') {
      if (t >= nextBlinkTime) {
        startBlink();
      }
      lidTargetL = 0.08;
      lidTargetR = 0.08;
    }

    var blinkLerp;
    if (blinkPhase === 'closing') {
      blinkLerp = 0.25;
    } else if (blinkPhase === 'opening') {
      blinkLerp = 0.18;
    } else {
      blinkLerp = 0.18;
    }

    lidCurrentL += (lidTargetL - lidCurrentL) * blinkLerp;
    lidCurrentR += (lidTargetR - lidCurrentR) * blinkLerp;

    if (blinkPhase === 'closing' && lidCurrentL > 0.95) {
      lidCurrentL = 1.0;
      lidCurrentR = 1.0;
      blinkPhase = 'holding';
      setTimeout(function () {
        blinkPhase = 'opening';
        lidTargetL = 0.08;
        lidTargetR = 0.08;
      }, 50);
    }

    if (blinkPhase === 'opening' && lidCurrentL < 0.12) {
      lidCurrentL = 0.08;
      lidCurrentR = 0.08;
      blinkPhase = 'idle';
      scheduleNextBlink();
    }

    lidLeft.style.height  = (lidCurrentL * 100) + '%';
    lidRight.style.height = (lidCurrentR * 100) + '%';
  }

  // CURSOR TRACKING — disabled. Camera is now the sole perceptual input.
  // To re-enable: uncomment this block and disable the attention brain gaze output.
  /*
  document.addEventListener('mousemove', function (e) {
    var buddyRect = buddyBody.getBoundingClientRect();
    var cx = buddyRect.left + buddyRect.width / 2;
    var cy = buddyRect.top + buddyRect.height / 2;
    var dx = e.clientX - cx;
    var dy = e.clientY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0) {
      gazeTarget.x = Math.max(-1, Math.min(1, dx / 300));
      gazeTarget.y = Math.max(-1, Math.min(1, dy / 300));
    }
  });
  */

  // ===== Camera Initialization =====

  async function initCamera() {
    try {
      var stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      cameraAvailable = true;
      videoElement.srcObject = stream;
      await videoElement.play();
      console.log('[DeskBuddy] Camera access granted.');
    } catch (err) {
      cameraAvailable = false;
      console.warn('[DeskBuddy] Camera unavailable:', err.message);
      showEmotionText('( ˘ω˘ ) no camera~');
      setTimeout(function () { showEmotionText('DeskBuddy: happy ˘ω˘'); }, 3000);
      return;
    }

    if (typeof vision === 'undefined') {
      console.warn('[DeskBuddy] MediaPipe vision bundle not loaded.');
      return;
    }

    try {
      console.log('[DeskBuddy] Loading MediaPipe FilesetResolver...');
      var filesetResolver = await vision.FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );

      var modelUrl = 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task';

      // Try GPU first, fall back to CPU
      try {
        faceLandmarker = await vision.FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: { modelAssetPath: modelUrl, delegate: 'GPU' },
          outputFaceBlendshapes: true,
          outputFacialTransformationMatrixes: true,
          runningMode: 'VIDEO',
          numFaces: 1
        });
        console.log('[DeskBuddy] FaceLandmarker created (GPU).');
      } catch (gpuErr) {
        console.warn('[DeskBuddy] GPU failed:', gpuErr.message, '— trying CPU...');
        faceLandmarker = await vision.FaceLandmarker.createFromOptions(filesetResolver, {
          baseOptions: { modelAssetPath: modelUrl, delegate: 'CPU' },
          outputFaceBlendshapes: true,
          outputFacialTransformationMatrixes: true,
          runningMode: 'VIDEO',
          numFaces: 1
        });
        console.log('[DeskBuddy] FaceLandmarker created (CPU).');
      }

      // Start detection loop
      setInterval(detectFace, DETECTION_INTERVAL);
      console.log('[DeskBuddy] Face detection loop started (~' + Math.round(1000 / DETECTION_INTERVAL) + ' FPS).');
    } catch (err) {
      console.warn('[DeskBuddy] MediaPipe init failed:', err.message);
    }
  }

  // ===== STAGE 3 — Perception: Face Detection + Signal Extraction =====

  var lastDetectTime = 0;
  var lastFaceSeenTime = 0;
  var lastDetectionTime = 0;  // for computing delta between detection frames

  function detectFace() {
    if (!faceLandmarker || !videoElement || videoElement.readyState < 2) return;

    var now = performance.now();
    // Ensure monotonically increasing timestamp for MediaPipe
    if (now <= lastDetectTime) now = lastDetectTime + 0.1;
    lastDetectTime = now;

    var results;
    try {
      results = faceLandmarker.detectForVideo(videoElement, now);
    } catch (e) {
      return; // Skip frame silently
    }

    var ts = performance.now();
    var detectionDelta = lastDetectionTime > 0 ? (ts - lastDetectionTime) : DETECTION_INTERVAL;
    lastDetectionTime = ts;

    // ---- Extract perception signals ----
    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
      facePresent = true;
      lastFaceSeenTime = ts;
      var landmarks = results.faceLandmarks[0];

      // Face center position (normalized 0-1)
      var noseTip = landmarks[4];
      faceX = noseTip ? noseTip.x : 0.5;
      faceY = noseTip ? noseTip.y : 0.5;
      faceNormX = (faceX - 0.5) * 2;  // range -1 to +1
      faceNormY = (faceY - 0.5) * 2;

      // Head movement (euclidean distance of nose tip between frames)
      if (noseTip && prevNoseTip) {
        headMovement = euclidean(
          { x: noseTip.x * videoElement.videoWidth, y: noseTip.y * videoElement.videoHeight },
          { x: prevNoseTip.x * videoElement.videoWidth, y: prevNoseTip.y * videoElement.videoHeight }
        );
      } else {
        headMovement = 0;
      }
      prevNoseTip = noseTip ? { x: noseTip.x, y: noseTip.y } : null;

      // Head yaw/pitch from transformation matrices
      if (results.facialTransformationMatrixes && results.facialTransformationMatrixes.length > 0) {
        var matrix = results.facialTransformationMatrixes[0];
        // matrix.data is a Float32Array with 16 elements (4x4 column-major)
        if (matrix && matrix.data) {
          var m = matrix.data;
          // Extract rotation angles from 4x4 column-major matrix
          // Yaw = rotation around Y axis (left/right head turn)
          // Pitch = rotation around X axis (up/down head tilt)
          headYaw   = Math.atan2(m[8], m[10]) * (180 / Math.PI);
          headPitch = Math.asin(-clamp(m[9], -1, 1)) * (180 / Math.PI);
        }
      } else {
        // Fallback: derive from landmarks
        var leftFace  = landmarks[234];
        var rightFace = landmarks[454];
        var topFace   = landmarks[10];
        var bottomFace = landmarks[152];
        if (noseTip && leftFace && rightFace && topFace && bottomFace) {
          var faceCenterX = (leftFace.x + rightFace.x) / 2;
          var halfWidth   = Math.abs(rightFace.x - leftFace.x) / 2 || 0.001;
          var normX = (noseTip.x - faceCenterX) / halfWidth;
          headYaw = normX * 30;  // rough approximation: ±1 → ±30°

          var faceCenterY = (topFace.y + bottomFace.y) / 2;
          var halfHeight  = Math.abs(bottomFace.y - topFace.y) / 2 || 0.001;
          var normY = (noseTip.y - faceCenterY) / halfHeight;
          headPitch = normY * 25;
        }
      }

      // Eye openness from blendshapes
      if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
        var blendshapes = {};
        results.faceBlendshapes[0].categories.forEach(function (s) {
          blendshapes[s.categoryName] = s.score;
        });
        var blinkL = blendshapes['eyeBlinkLeft'] || 0;
        var blinkR = blendshapes['eyeBlinkRight'] || 0;
        eyeOpenness = 1 - (blinkL + blinkR) / 2;
      }

      // Log signals periodically for debugging
      if (Math.random() < 0.02) {
        console.log('[Perception] yaw=' + headYaw.toFixed(1) + '° pitch=' + headPitch.toFixed(1) +
          '° eyeOpen=' + eyeOpenness.toFixed(2) + ' move=' + headMovement.toFixed(1) +
          ' fNorm=(' + faceNormX.toFixed(2) + ',' + faceNormY.toFixed(2) + ')' +
          ' state=' + currentUserState);
      }

    } else {
      facePresent = false;
      headMovement = 0;
    }

    // ---- STAGE 3: User State Classification ----
    classifyUserState(detectionDelta);

    // ---- STAGE 4: Motion Detection ----
    updateMotionDetection(detectionDelta);

    // ---- Update UI from state ----
    updateUIFromState(ts);
  }

  // ===== STAGE 3 — User State Classification =====
  function classifyUserState(deltaMs) {
    var rawState = 'NoFace';

    if (facePresent) {
      noFaceTimer = 0;

      // Check Focused: face present + |headYaw| < 15 + eyeOpenness > 0.40
      if (Math.abs(headYaw) < 15 && eyeOpenness > 0.40) {
        rawState = 'Focused';
      }
      // Check LookingAway: face present + |headYaw| > 20
      else if (Math.abs(headYaw) > 20) {
        rawState = 'LookingAway';
      }
      // Default with face present
      else {
        rawState = 'Focused';  // within 15-20° treated as focused
      }

      // Check Sleepy: eyeOpenness < 0.25 held ≥ 3000ms
      if (eyeOpenness < 0.25) {
        sleepyTimer += deltaMs;
        if (sleepyTimer >= SLEEPY_HOLD_MS) {
          rawState = 'Sleepy';
        }
      } else {
        sleepyTimer = 0;
      }

      // Check Distracted: >3 headYaw direction-changes >20° within 10s
      var nowMs = performance.now();
      yawHistory.push({ time: nowMs, yaw: headYaw });
      // Prune old entries (>10s)
      while (yawHistory.length > 0 && nowMs - yawHistory[0].time > 10000) {
        yawHistory.shift();
      }
      if (yawHistory.length >= 3) {
        var dirChanges = 0;
        for (var i = 1; i < yawHistory.length; i++) {
          var diff = yawHistory[i].yaw - yawHistory[i - 1].yaw;
          if (Math.abs(diff) > 20) {
            // Check sign change from previous significant diff
            if (i >= 2) {
              var prevDiff = yawHistory[i - 1].yaw - yawHistory[i - 2].yaw;
              if ((diff > 0 && prevDiff < 0) || (diff < 0 && prevDiff > 0)) {
                dirChanges++;
              }
            }
          }
        }
        if (dirChanges > 3) {
          rawState = 'Distracted';
        }
      }
    } else {
      // No face
      sleepyTimer = 0;
      noFaceTimer += deltaMs;
      if (noFaceTimer >= NOFACE_HOLD_MS) {
        rawState = 'NoFace';
      } else {
        // Keep previous state briefly during transition
        rawState = currentUserState !== 'NoFace' ? currentUserState : 'NoFace';
      }
    }

    // Debounce: candidate must hold for ≥ 1000ms
    if (rawState !== candidateState) {
      candidateState = rawState;
      candidateStateTime = performance.now();
    }

    if (rawState === candidateState && performance.now() - candidateStateTime >= STATE_DEBOUNCE_MS) {
      if (currentUserState !== candidateState) {
        previousUserState = currentUserState;
        currentUserState = candidateState;
        stateEntryTime = performance.now();
        console.log('[State] ' + previousUserState + ' → ' + currentUserState);
      }
    }
  }

  // ===== STAGE 4 — Motion Detection =====
  function updateMotionDetection(deltaMs) {
    wasStill = userIsStill;

    if (headMovement < STILL_THRESHOLD_PX) {
      stillTimer += deltaMs;
      timeStillMs += deltaMs;
      if (stillTimer >= STILL_DURATION_MS) {
        userIsStill = true;
      }
    } else {
      stillTimer = 0;
      timeStillMs = 0;
      userIsStill = false;
    }
  }

  // ===== STAGE 5 — Attention Brain =====
  function evaluateAttention() {
    var now = performance.now();

    // P1 — Emotion lock (Grumpy / Sulking / Suspicious)
    if (currentEmotion === 'grumpy' || currentEmotion === 'sulking' || currentEmotion === 'suspicious') {
      // Lock gaze to last known face position. No scan. No drift.
      curiosityScanActive = false;
      searchScanActive = false;
      return;
    }

    // P2 — User just started moving (userIsStill just became false)
    if (wasStill && !userIsStill) {
      gazeTarget.x = faceNormX;
      gazeTarget.y = faceNormY;
      if (curiosityScanActive || currentEmotion === 'sleepy') {
        triggerEmbarrassed = true;
      }
      curiosityScanActive = false;
      searchScanActive = false;
      return;
    }

    // P3 — User present, recently moving (still < 5000ms)
    if (facePresent && timeStillMs < STILL_DURATION_MS) {
      curiosityScanActive = false;
      searchScanActive = false;
      var microX = (Math.random() - 0.5) * 0.04;
      var microY = (Math.random() - 0.5) * 0.03;
      gazeTarget.x = faceNormX + microX;
      gazeTarget.y = faceNormY + microY;
      return;
    }

    // P4 — User still 5000–15000ms
    if (facePresent && userIsStill && timeStillMs < 15000) {
      curiosityScanActive = false;
      searchScanActive = false;
      gazeTarget.x = lerp(gazeTarget.x, faceNormX + (Math.random() - 0.5) * 0.3, 0.003);
      gazeTarget.y = lerp(gazeTarget.y, faceNormY + (Math.random() - 0.5) * 0.2, 0.003);
      return;
    }

    // P5 — User still ≥ 15000ms — Curiosity Scan
    if (facePresent && userIsStill && timeStillMs >= 15000) {
      searchScanActive = false;
      if (!curiosityScanActive) {
        curiosityScanActive = true;
        curiosityScanStep = 0;
        curiosityScanHoldEnd = now + 2000 + Math.random() * 2000;
      }
      updateCuriosityScan(now);
      return;
    }

    // P6 — NoFace
    if (currentUserState === 'NoFace') {
      curiosityScanActive = false;
      if (!searchScanActive) {
        searchScanActive = true;
        searchScanStep = 0;
        searchScanHoldEnd = now + 400 + Math.random() * 200;
        searchScanLerp = 0.12;
      }
      updateSearchScan(now);
      return;
    }
  }

  // ===== Curiosity Scan Sequence =====
  var curiosityScanPoints = [
    { x: -0.50, y: +0.05 },  // peek left
    { x: +0.50, y: +0.05 },  // peek right
    { x: -0.10, y: -0.40 },  // look up curiously
    { x: -0.65, y: -0.35 },  // background upper-left
    { x: +0.65, y: -0.35 },  // background upper-right
    null,                      // random (computed on enter)
    null,                      // return to face (computed on enter)
    null                       // hold face (computed on enter)
  ];

  function updateCuriosityScan(now) {
    // Check if user moved during scan → abort to step 7
    if (wasStill && !userIsStill) {
      curiosityScanStep = 6;  // jump to face return
      triggerEmbarrassed = true;
      curiosityScanHoldEnd = now + 100;
    }

    if (now >= curiosityScanHoldEnd) {
      curiosityScanStep = (curiosityScanStep + 1) % 8;
      curiosityScanHoldEnd = now + 2000 + Math.random() * 2000;
      if (curiosityScanStep === 7) {
        // hold face step: 2000-3000ms
        curiosityScanHoldEnd = now + 2000 + Math.random() * 1000;
      }
    }

    var target;
    if (curiosityScanStep < 5) {
      target = curiosityScanPoints[curiosityScanStep];
    } else if (curiosityScanStep === 5) {
      // Random interesting point
      target = {
        x: (Math.random() - 0.5) * 0.8,
        y: (Math.random() - 0.5) * 0.6
      };
    } else {
      // Steps 6 & 7: return to / hold face
      target = { x: faceNormX, y: faceNormY };
    }

    gazeTarget.x = lerp(gazeTarget.x, target.x, 0.035);
    gazeTarget.y = lerp(gazeTarget.y, target.y, 0.035);
  }

  // ===== Search Scan (NoFace) =====
  var searchScanPoints = [
    { x: -0.70, y: 0.00 },
    { x: +0.70, y: 0.00 },
    { x:  0.00, y: -0.55 },
    { x:  0.00, y: 0.00 }
  ];

  function updateSearchScan(now) {
    if (now >= searchScanHoldEnd) {
      searchScanStep = (searchScanStep + 1) % searchScanPoints.length;
      searchScanHoldEnd = now + 400 + Math.random() * 200;
      // Each loop iteration: slightly increase lerp speed
      if (searchScanStep === 0) {
        searchScanLerp = Math.min(searchScanLerp + 0.008, 0.25);
      }
    }

    var target = searchScanPoints[searchScanStep];
    gazeTarget.x = lerp(gazeTarget.x, target.x, searchScanLerp);
    gazeTarget.y = lerp(gazeTarget.y, target.y, searchScanLerp);
  }

  // ===== UI Update from State =====
  function updateUIFromState(ts) {
    showUserState('you: ' + currentUserState.toLowerCase());

    if (triggerEmbarrassed) {
      currentEmotion = 'embarrassed';
      showEmotionText('DeskBuddy: embarrassed ˘ω˘!');
      triggerEmbarrassed = false;
      // Reset after 2 seconds
      setTimeout(function () {
        if (currentEmotion === 'embarrassed') {
          currentEmotion = 'happy';
        }
      }, 2000);
    } else if (currentUserState === 'Focused') {
      currentEmotion = 'happy';
      showEmotionText('DeskBuddy: happy ˘ω˘');
      if (!focusTimerRunning) {
        focusTimerRunning = true;
        lastFocusTickTime = ts;
      }
    } else if (currentUserState === 'LookingAway') {
      currentEmotion = 'suspicious';
      showEmotionText('DeskBuddy: suspicious ˘ω˘?');
      focusTimerRunning = false;
    } else if (currentUserState === 'Distracted') {
      currentEmotion = 'curious';
      showEmotionText('DeskBuddy: curious ˘ω˘?');
      focusTimerRunning = false;
    } else if (currentUserState === 'Sleepy') {
      currentEmotion = 'sleepy';
      showEmotionText('DeskBuddy: sleepy ˘ω˘ ~');
      focusTimerRunning = false;
    } else if (currentUserState === 'NoFace') {
      currentEmotion = 'scared';
      showEmotionText('DeskBuddy: looking for you ˘ω˘');
      focusTimerRunning = false;
    }

    // Curiosity scan emotion
    if (curiosityScanActive && currentEmotion !== 'embarrassed') {
      currentEmotion = 'curious';
      showEmotionText('DeskBuddy: curious ˘ω˘ ~');
    }

    // Accumulate focus time
    if (focusTimerRunning) {
      var elapsed = (ts - lastFocusTickTime) / 1000;
      if (elapsed > 0 && elapsed < 1) {
        focusTimerSeconds += elapsed;
      }
      lastFocusTickTime = ts;
      updateFocusTimerDisplay();
    }
  }

  // ===== STAGE 6 — Eye Motion System: Per-frame update =====
  function updateEyeMotion(t) {
    // Evaluate attention brain periodically or on state change
    var now = performance.now();
    if (now - lastAttentionEvalTime >= ATTENTION_EVAL_MS) {
      evaluateAttention();
      lastAttentionEvalTime = now;
    }

    // Layer 2 — Pupil gaze
    var targetPX = gazeTarget.x * PUPIL_MAX_TRAVEL;
    var targetPY = gazeTarget.y * PUPIL_MAX_TRAVEL;
    pupilX += (targetPX - pupilX) * pupilLerpSpeed;
    pupilY += (targetPY - pupilY) * pupilLerpSpeed;

    // Clamp to 30% of iris radius
    pupilX = clamp(pupilX, -PUPIL_MAX_TRAVEL, PUPIL_MAX_TRAVEL);
    pupilY = clamp(pupilY, -PUPIL_MAX_TRAVEL, PUPIL_MAX_TRAVEL);

    // Organic imperfection: slight offset for right eye
    var rightOffsetX = (Math.random() - 0.5) * 0.5;
    var rightOffsetY = (Math.random() - 0.5) * 0.5;

    // Layer 3 — Body lean (gaze drift)
    leanTargetX = gazeTarget.x * 8;   // max ±8px
    leanTargetY = gazeTarget.y * 6;   // max ±6px
    leanX += (leanTargetX - leanX) * 0.035;
    leanY += (leanTargetY - leanY) * 0.035;

    // Body tilt for curiosity scan
    var bodyTilt = 0;
    if (curiosityScanActive) {
      bodyTilt = gazeTarget.x * 0.8;  // 0.8° toward scan direction
    }

    // ---- Combined Transform: ONE DOM write per element per frame ----

    // Body: float + lean + tilt
    computeFloat(t);
    buddyBody.style.transform = 'translate(' + (lastFloatX + leanX) + 'px, ' +
      (lastFloatY + leanY) + 'px) rotate(' + bodyTilt + 'deg)';

    // Pupils
    pupilLeft.style.transform = 'translate(calc(-50% + ' + pupilX + 'px), calc(-50% + ' + pupilY + 'px))';
    pupilRight.style.transform = 'translate(calc(-50% + ' + (pupilX + rightOffsetX) +
      'px), calc(-50% + ' + (pupilY + rightOffsetY) + 'px))';
  }

  // ===== Main Animation Loop =====
  function animate() {
    requestAnimationFrame(animate);
    var t = performance.now();

    updateBlink(t);
    updateEyeMotion(t);
  }

  // ===== Initialize =====
  scheduleNextBlink();
  animate();
  initCamera();

})();
</script>
