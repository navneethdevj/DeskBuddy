name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm type-check

  test:
    name: Test
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: deskbuddy
          POSTGRES_PASSWORD: deskbuddy
          POSTGRES_DB: deskbuddy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://deskbuddy:deskbuddy@localhost:5432/deskbuddy_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
      CORS_ORIGIN: http://localhost:3000
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      GOOGLE_CALLBACK_URL: http://localhost:4000/api/v1/auth/google/callback

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Verify coverage threshold
        run: |
          node -e "
            const fs = require('fs');
            const path = 'apps/api/coverage/coverage-summary.json';
            if (!fs.existsSync(path)) { console.log('No coverage file found — skipping check'); process.exit(0); }
            const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
            const lines = summary.total.lines.pct;
            if (lines < 70) { console.error('Line coverage ' + lines + '% is below 70% threshold'); process.exit(1); }
            console.log('Line coverage: ' + lines + '%');
          "

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -d packages/shared/dist || (echo "Missing packages/shared/dist" && exit 1)
          test -d apps/api/dist || (echo "Missing apps/api/dist" && exit 1)
          echo "Build artifacts verified"

  security:
    name: Security Audit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for critical CVEs
        run: npm audit --audit-level=critical
